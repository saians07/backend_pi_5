name: backend_pi_5 CI/CD Pipeline

# trigger events
on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  GO_VERSION: '1.25.1'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend_pi_5
  APP_NAME: backend_pi_5

jobs:
  # CHECK CODE QUALITY AND SECURITY
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: Verify Go modules
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum
        
      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1.4.0
        with:
          version: "latest"
          install-go: false
      
      - name: Run gosec (Security Scanner)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

      - name: Check for vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # TESTING
  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: code-quality

    strategy:
      matrix:
        go-version: ['1.24.0', '1.25.1']

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: backend_pi_5_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: install dependencies
        run: go mod download

      - name: Wait for services
        run:
          timeout 60s sh -c 'until nc -z localhost 5432; do sleep 1; done'
          timeout 60s sh -c 'until nc -z localhost 6379; do sleep 1; done'
      
      # TODO: Implement this migration capabilities
      # - name: Run database migrations
      #   run: |
      #     go run cmd/migrate/main.go up
      #   env:
      #     DATABASE_URL: postgres://testuser:testpassword@localhost:5432/backend_pi_5_test?sslmode=disable

  # TODO: Implement benchmarking
  # benchmark:
  #   name: Run benchmark
  #   runs-on: ubuntu-latest
  #   needs: code-quality
  #   if: github.event_name == 'pull_request'

  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

  #     - name: Setup Go
  #       uses: actions/setup-go@v4
  #       with:
  #         go-version: ${{ env.GO_VERSION }}
  #         cache: true

  #     - name: Run benchmark
  #       run: |
  #         go test -bench=. -benchmem -count=5 ./... | tee benchmark.txt

  #     - name: Store benchmark result
  #       uses: benchmark-action/github-action-benchmark@v1
  #       with:
  #         name: Go benchmark
  #         tool: 'go'
  #         output-file-path: benchmark.txt
  #         github-token: ${{ secrets.GITHUB_TOKEN }}
  #         auto-push: true
  #         comment-on-alert: true
  #         alert-threshold: '200%'
  #         fail-on-alert: true

  # build binary then docker
  # this build only happens on push
  build:
    name: Build Application
    runs-on: ubuntu-latest
    # if: github.event_name == 'push'
    needs: [code-quality, test]

    outputs:
      image: ${{ steps.build.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.build.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]], then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${echo $GITHUB_SHA | cut -c1-8}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      - name: Build ARM64 binary (for Raspberry Pi)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
          -ldflags="-X main.Version=${{ steps.version.outputs.version }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -s -w" \
          -o bin/backend_pi_5-arm64 \
          ./cmd/api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            bin/backend_pi_5
            bin/backend_pi_5-arm64
          retention-days: 30
      