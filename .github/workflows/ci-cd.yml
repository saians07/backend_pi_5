name: backend_pi_5 CI/CD Pipeline

# trigger events
on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  GO_VERSION: '1.25'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend_pi_5
  APP_NAME: backend_pi_5

jobs:
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: Verify Go modules
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum
        
      - name: Tun go vet
        run: go vet ./...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1.4.0
        with:
          version: "2023.1.6"
          install-go: false
      
      - name: Run gosec (Security Scanner)
        uses: securego/gosec@master
        with:
          args: ./...

      - name: Check for vulnerabilities
        run: |
          go install golang.org/x/vuln/govulncheck@latest
          govulncheck ./...

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: code-quality

    strategy:
      matrix:
        go-version: ['1.24', '1.25']

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: backend_pi_5_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --helath-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: install dependencies
        run: go mod download

      - name: Wait for services
        run:
          timeout 60s sh -c 'until nc -z localhost 5432; do sleep 1; done'
          timeout 60s sh -c 'until nc -z localhost 6379; do sleep 1; done'
          
  