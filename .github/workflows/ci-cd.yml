name: backend_pi_5 CI/CD Pipeline

# trigger events
on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  release:
    types: [published, created]
  workflow_dispatch:

env:
  GO_VERSION: '1.25.1'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_NAME: backend_pi_5

jobs:
  # CHECK CODE QUALITY AND SECURITY
  # Executed only on pull request
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: Verify Go modules
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum
        
      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1.4.0
        with:
          version: "latest"
          install-go: false
      
      - name: Run gosec (Security Scanner)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

      - name: Check for vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # TESTING
  # Executed only on pull request
  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.event_name == 'pull_request'

    strategy:
      matrix:
        go-version: ['1.24.0', '1.25.1']

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: backend_pi_5_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: install dependencies
        run: go mod download

      - name: Wait for services
        run:
          timeout 60s sh -c 'until nc -z localhost 5432; do sleep 1; done'
          timeout 60s sh -c 'until nc -z localhost 6379; do sleep 1; done'
      
      # TODO: Implement this migration capabilities
      # - name: Run database migrations
      #   run: |
      #     go run cmd/migrate/main.go up
      #   env:
      #     DATABASE_URL: postgres://testuser:testpassword@localhost:5432/backend_pi_5_test?sslmode=disable

  # build must always be DONE ON EVERY STEP!
  build:
    name: Build Application
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.build.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.build.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Generate version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(echo $GITHUB_SHA | cut -c1-8)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      - name: Build ARM64 binary (for Raspberry Pi)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
          -ldflags="-X main.Version=${{ steps.version.outputs.version }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -s -w" \
          -o bin/backend_pi_5-arm64 \
          ./cmd/api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            bin/backend_pi_5-arm64
          retention-days: 30

      # Setting up docker
      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scripts/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # deployment is only possible to be done when we are releasing something
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: ./bin
      
      - name: Install cloudflare
        uses: AnimMouse/setup-cloudflared@v2

      - name: Setup ssh
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ vars.SSH_PRODUCTION_URL }}
        run: |
          mkdir -p ~/.ssh

          echo "$SSH_KEY" > ~/.ssh/github_actions
          chmod 600 ~/.ssh/github_actions

          echo "Host pi-ssh" > ~/.ssh/config
          echo "  HostName $SSH_HOST" >> ~/.ssh/config
          echo "  ProxyCommand cloudflared access ssh --hostname %h" >> ~/.ssh/config
          echo "  User ${{ secrets.SSH_PRODUCTION_USER }}" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Tes ssh to the server
        env:
          SSH_HOST: ${{ secrets.SSH_PRODUCTION_URL }}
          SSH_USER: ${{ secrets.SSH_PRODUCTION_USER }}
        run: |
          ssh -v -i ~/.ssh/github_actions \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          pi-ssh "docker pull ${{ needs.build.outputs.image }} && ~/backend_pi_5/build.sh"

