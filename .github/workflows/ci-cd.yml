name: backend_pi_5 CI/CD Pipeline

# trigger events
on:
  push:
    branches: [master]
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [master]
  release:
    types: [published, created]
  workflow_dispatch:

env:
  GO_VERSION: '1.25.1'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  APP_NAME: backend_pi_5

jobs:
  
      
      # TODO: Implement this migration capabilities
      # - name: Run database migrations
      #   run: |
      #     go run cmd/migrate/main.go up
      #   env:
      #     DATABASE_URL: postgres://testuser:testpassword@localhost:5432/backend_pi_5_test?sslmode=disable

  # build must always be DONE ON EVERY STEP!
  build:
    name: Build Application
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.build.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.build.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      
      - name: Create .env for build
        run: |
          echo ${{ secrets.PI5_POSTGRES_DB_NAME }} > .env
          echo ${{ secrets.PI5_POSTGRES_DB_USER }} >> .env
          echo ${{ secrets.PI5_POSTGRES_DB_PWD }} >> .env
          echo ${{ secrets.PI5_POSTGRES_DB_PORT }} >> .env
          echo ${{ secrets.PI5_POSTGRES_DB_HOST }} >> .env
          echo ${{ secrets.PI5_GO_BACKEND_ENV }} >> .env

      - name: Generate version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(echo $GITHUB_SHA | cut -c1-8)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-X main.Version=${{ steps.version.outputs.version }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -s -w" \
            -o bin/backend_pi_5 \
            ./cmd/api
      
      - name: Build ARM64 binary (for Raspberry Pi)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
          -ldflags="-X main.Version=${{ steps.version.outputs.version }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -s -w" \
          -o bin/backend_pi_5-arm64 \
          ./cmd/api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            bin/backend_pi_5
            bin/backend_pi_5-arm64
          retention-days: 30

      # Setting up docker
      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scripts/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # deployment is only possible to be done when we are releasing something
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: ./bin
      
      - name: Install cloudflare
        uses: AnimMouse/setup-cloudflared@v2

      - name: Setup ssh
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_PRODUCTION_URL }}
        run: |
          mkdir -p ~/.ssh

          echo "$SSH_KEY" > ~/.ssh/github_actions
          chmod 600 ~/.ssh/github_actions

          echo "Host pi-ssh" > ~/.ssh/config
          echo "  HostName $SSH_HOST" >> ~/.ssh/config
          echo "  ProxyCommand cloudflared access ssh --hostname %h" >> ~/.ssh/config
          echo "  User ${{ secrets.SSH_PRODUCTION_USER }}" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: SSH to server
        env:
          SSH_HOST: ${{ secrets.SSH_PRODUCTION_URL }}
          SSH_USER: ${{ secrets.SSH_PRODUCTION_USER }}
        run: |
          ssh -v -i ~/.ssh/github_actions \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          pi-ssh "cd ~/backend_pi_5 && git pull && chmod +x deploy.sh && ./deploy.sh"
  
  create-release:
    name: Create a Github Release
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from file
        id: get_version
        run: |
          VERSION=$(cat version.txt)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check_tag
        uses: mukunku/tag-exists-action@v1.6.0
        with:
          tag: "${{ steps.get_version.outputs.VERSION }}"

      - name: Create new tag
        if: steps.check_tag.outputs.exists == 'false'
        id: create_tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `${{ steps.get_version.outputs.VERSION }}`.trim();
            
            console.log(`Creating tag ${tag}`);
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });
            console.log(`Tag ${tag} created successfully.`);
            
            core.setOutput('tag_name', tag);
      
      - name: Create GitHub release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          release_name: backend_pi_5 ${{ steps.get_version.outputs.VERSION }}
          body: |
            🚀 **Production Release - backend_pi_5**
            
            **Version:** ${{ steps.get_version.outputs.VERSION }}
            **Build:** ${{ github.run_number }}
            
            **Changes:**
            ${{ github.event.head_commit.message }}
            
            **Docker Image:** 
            ```
            ${{ needs.build.outputs.image }}
            ```
            
            **Deployed by:** @${{ github.actor }}
            **Commit:** ${{ github.sha }}
            
            ---
            
            🔗 **API Endpoint:** https://api.triple-s.web.id
            🏥 **Health Check:** https://api.triple-s.web.id/health
          draft: false
          prerelease: false
